{% extends "base.html" %}
{% block title %}부가새 — 부산물의 가치를 새롭게{% endblock %}

{% block content %}
<section class="hero">
  <div class="hero-meta">
    <span>농업 부산물 매칭 플랫폼 ⟶ 부가새</span>
    <span>부산물의 가치를 새롭게</span>
  </div>
  <h1 class="fade-in">
    버려지는 <span class="strike">부산물</span>이,<br>
    새로운 <span class="accent">자원</span>으로.
  </h1>

  <p class="hero-desc fade-in delay-1" style="max-width: 560px; margin: 28px 0 0;">
    부가새는 농가의 부산물 발생량을 AI로 예측하고, 이를 필요로 하는 기업과 연결하는
    농업 부산물 거래 플랫폼입니다.
  </p>

  <div class="hero-actions fade-in delay-2">
    <a href="{{ url_for('service') }}" class="btn-primary">서비스 시작하기 →</a>
    <a href="{{ url_for('about') }}" class="btn-ghost">자세히 보기</a>
  </div>

  <div class="hero-bottom" style="margin-top: 64px;">
    <div class="stat-block fade-in delay-2">
      <div class="label">예측 대상 작물</div>
      <div class="number">9<span class="unit">종</span></div>
    </div>
    <div class="stat-block fade-in delay-3">
      <div class="label">학습 데이터</div>
      <div class="number">공공<span class="unit"> 데이터</span></div>
    </div>
    <div class="stat-block fade-in delay-3">
      <div class="label">부산물 환산</div>
      <div class="number">RPR<span class="unit"> 기반</span></div>
    </div>
  </div>
</section>
{% endblock %}
